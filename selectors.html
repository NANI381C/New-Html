<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      h1::after{
        content: " Shanu ";
      }
      h1::before{
        content: "Sheela ";
      }
      h1::first-letter{
        background-color: yellow;
      }
      h1::first-line{
        background-color: red;
      }
      li::marker{
        content: "🔺";
      }

      li::selection{
        background-color: yellow;
      }
    </style>
  </head>
  <body>
      <ul>
        <li>MERN</li>
        <li>JAVA</li>
        <li>C++</li>
        <li>PHP</li>
      </ul>
  </body>
</html>
